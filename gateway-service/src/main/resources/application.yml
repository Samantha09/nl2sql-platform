server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: schema-service
          uri: lb://schema-service
          predicates:
            - Path=/api/schema/**
        - id: query-service
          uri: lb://query-service
          predicates:
            - Path=/api/query/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health
