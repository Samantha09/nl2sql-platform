spring:
  application:
    name: schema-service-test
  config:
    import: optional:classpath:application-empty.yml
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  # 测试用 H2，表结构由 Hibernate ddl-auto 依实体生成；
  # 不执行 MySQL 语法的 schema.sql（CREATE DATABASE 等在 H2 上不兼容）
  sql:
    init:
      mode: never

logging:
  level:
    root: warn

