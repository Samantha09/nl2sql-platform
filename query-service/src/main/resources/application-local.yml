spring:
  config:
    activate:
      on-profile: local
    import:
      - optional:nacos:nl2sql-common.yml?group=DEFAULT_GROUP
      - optional:nacos:nl2sql-query-service.yml?group=DEFAULT_GROUP
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/nl2sql_query?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: nl2sql123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: admin
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}

server:
  port: 8082

nl2sql:
  cache:
    key-prefix: "nl2sql:"
    default-ttl: 10m
    null-ttl: 60s
    cache-null-values: true
    ttls:
      query:history: 2m
  mq:
    max-retries: 3
    initial-interval: 1000
    multiplier: 2.0
    max-interval: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: info
