server:
  port: 8082

spring:
  application:
    name: query-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/nl2sql_query?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:nl2sql123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASS:admin}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}

# 缓存 + MQ 配置（详见 common CacheProperties / MqProperties）
nl2sql:
  cache:
    key-prefix: "nl2sql:"
    default-ttl: 10m
    null-ttl: 60s
    cache-null-values: true
    ttls:
      query:history: 2m
  mq:
    max-retries: 3
    initial-interval: 1000
    multiplier: 2.0
    max-interval: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
